<!DOCTYPE html>
<html lang="ja" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Radio Recorder{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <!-- ローディングオーバーレイ -->
  <div id="loader">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">読み込み中...</span>
    </div>
  </div>

  <!-- トップバー -->
  <header class="topbar d-flex align-items-center px-3">
    <button class="btn btn-link topbar-toggle text-white p-0 me-3" id="sidebarToggle" title="メニュー">
      <i class="bi bi-list fs-4"></i>
    </button>
    <span class="topbar-title fw-bold fs-5">Radio Recorder</span>
  </header>

  <!-- サイドバー -->
  <nav class="sidebar" id="sidebar">
    <ul class="nav flex-column pt-2">
      <li class="nav-item">
        <a class="nav-link sidebar-link {% if request.path == '/' %}active{% endif %}" href="/">
          <i class="bi bi-speedometer2"></i>
          <span>ダッシュボード</span>
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link sidebar-link {% if request.path == '/on-air' %}active{% endif %}" href="/on-air">
          <i class="bi bi-broadcast"></i>
          <span>放映中</span>
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link sidebar-link {% if request.path == '/programs' %}active{% endif %}" href="/programs">
          <i class="bi bi-calendar3"></i>
          <span>番組表</span>
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link sidebar-link {% if request.path == '/recording' %}active{% endif %}" href="/recording">
          <i class="bi bi-record-circle"></i>
          <span>録画中</span>
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link sidebar-link {% if request.path == '/recorded' or request.path == '/recordings' %}active{% endif %}" href="/recorded">
          <i class="bi bi-film"></i>
          <span>録画済み</span>
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link sidebar-link {% if request.path == '/reservations' %}active{% endif %}" href="/reservations">
          <i class="bi bi-bookmark-check"></i>
          <span>予約</span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- メインコンテンツ -->
  <main class="main-content" id="mainContent">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
