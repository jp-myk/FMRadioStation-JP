{% extends "layout.html" %}
{% block title %}放映中 — FM Radio Station{% endblock %}

{% block content %}
<div class="page-header d-flex align-items-center justify-content-between">
  <h4 class="mb-0"><i class="bi bi-broadcast me-2"></i>放映中</h4>
  <div class="d-flex align-items-center gap-2">
    {% if asr_available %}
    <button class="btn btn-sm asr-toggle {{ 'asr-on' if asr_enabled else 'btn-outline-secondary' }}"
            id="asrToggleBtn" aria-pressed="{{ 'true' if asr_enabled else 'false' }}"
            title="自動字幕（音声認識）の ON/OFF" onclick="toggleAsr()">
      <i class="bi {{ 'bi-badge-cc-fill' if asr_enabled else 'bi-badge-cc' }}" id="asrToggleIcon"></i>
      <span id="asrToggleLabel" class="d-none d-sm-inline ms-1">字幕 {{ 'ON' if asr_enabled else 'OFF' }}</span>
    </button>
    {% endif %}
    <button class="btn btn-sm btn-outline-secondary" id="refreshBtn" onclick="loadOnAir()">
      <i class="bi bi-arrow-clockwise me-1"></i>更新
    </button>
  </div>
</div>

<!-- 再生中バー -->
<div id="nowPlayingBar" class="now-playing-bar d-none">
  <div class="d-flex align-items-center gap-2 flex-wrap">
    <span id="nowPlayingBadge" class="badge bg-danger">
      <i class="bi bi-broadcast-pin"></i> LIVE
    </span>
    <span id="nowPlayingTitle" class="fw-bold text-white"></span>
    <span id="nowPlayingStation" class="text-secondary small"></span>
    <div id="connectingSpinner" class="spinner-border spinner-border-sm text-light d-none" role="status"></div>
    <span id="connectingStatus" class="text-secondary small"></span>
    <div id="streamError" class="d-none"></div>
    <button class="btn btn-sm btn-outline-danger ms-auto" id="stopBtn" onclick="stopStream()">
      <i class="bi bi-stop-fill me-1"></i>停止
    </button>
  </div>
  <audio id="streamAudio" style="display:none;"></audio>
</div>

<!-- 自動字幕パネル -->
<div id="transcriptPanel" class="transcript-panel d-none">
  <div class="transcript-header">
    <i class="bi bi-card-text me-1"></i>自動字幕<span class="badge bg-secondary ms-2">ベータ</span>
  </div>
  <div id="transcriptBody" class="transcript-body"></div>
</div>

<!-- ローディング -->
<div id="onAirLoader" class="text-center py-5">
  <div class="spinner-border text-primary" role="status"></div>
  <p class="text-secondary mt-2">番組情報を取得中...</p>
</div>

<!-- エラー -->
<div id="onAirError" class="d-none alert alert-warning mt-3">
  <i class="bi bi-exclamation-triangle me-2"></i>
  番組情報の取得に失敗しました。
</div>

<!-- 番組カードグリッド -->
<div id="onAirGrid" class="row g-3 mt-1 d-none"></div>

{% endblock %}

{% block scripts %}
<script>
let _streamRequestId = 0;   // 各 playStream 呼び出しに一意なID
let _activeStationId = null; // 現在アクティブなステーション（接続中含む）
let _lastStation = null;     // 最後に再生したステーション情報（再起動用）
let _transcriptTimer = null; // 字幕ポーリングの interval
let _transcriptStation = null;
let _asrCursor = 0;          // 取得済みセグメント数
let _asrEnabled = {{ 'true' if asr_enabled else 'false' }};  // 自動字幕 ON/OFF（サーバ初期値）

function renderAsrToggle() {
  const btn = document.getElementById('asrToggleBtn');
  if (!btn) return;
  const icon  = document.getElementById('asrToggleIcon');
  const label = document.getElementById('asrToggleLabel');
  btn.classList.toggle('asr-on', _asrEnabled);
  btn.classList.toggle('btn-outline-secondary', !_asrEnabled);
  btn.setAttribute('aria-pressed', _asrEnabled ? 'true' : 'false');
  icon.className = 'bi ' + (_asrEnabled ? 'bi-badge-cc-fill' : 'bi-badge-cc');
  label.textContent = '字幕 ' + (_asrEnabled ? 'ON' : 'OFF');
}

function showAsrOff() {
  const panel = document.getElementById('transcriptPanel');
  const body  = document.getElementById('transcriptBody');
  if (!panel.classList.contains('d-none')) {
    body.innerHTML = '<div class="transcript-empty">自動字幕はオフです</div>';
  }
}

function toggleAsr() {
  const btn = document.getElementById('asrToggleBtn');
  const next = !_asrEnabled;
  if (btn) btn.disabled = true;
  fetch('/api/asr', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ enabled: next, station_id: _activeStationId }),
  })
    .then(r => r.json())
    .then(data => {
      _asrEnabled = data.enabled;
      renderAsrToggle();
      // 再生中なら字幕パネルへ即反映
      if (_activeStationId) {
        if (_asrEnabled) startTranscript(_activeStationId);
        else { stopTranscript(); showAsrOff(); }
      }
    })
    .catch(() => {})
    .finally(() => { if (btn) btn.disabled = false; });
}

function syncAsrState() {
  // 別タブでの変更等に追従して初期状態を同期する。
  fetch('/api/asr')
    .then(r => r.json())
    .then(data => { _asrEnabled = data.enabled; renderAsrToggle(); })
    .catch(() => {});
}

function startTranscript(stationId) {
  // 同じ局で既にポーリング中なら何もしない
  if (_transcriptTimer && _transcriptStation === stationId) return;
  stopTranscript();
  _transcriptStation = stationId;
  _asrCursor = 0;
  const panel = document.getElementById('transcriptPanel');
  const body  = document.getElementById('transcriptBody');
  body.innerHTML = '<div class="transcript-empty">認識待機中...</div>';
  panel.classList.remove('d-none');
  const myRequestId = _streamRequestId;
  let unavailableShown = false;
  let hasText = false;

  const poll = () => {
    if (myRequestId !== _streamRequestId) { stopTranscript(); return; }
    fetch('/api/transcript/' + stationId + '?since=' + _asrCursor)
      .then(r => r.json())
      .then(data => {
        if (myRequestId !== _streamRequestId) return;
        if (data.enabled === false) {
          // ユーザーがトグルで OFF にしている（利用不可とは区別）
          if (!unavailableShown) { showAsrOff(); unavailableShown = true; }
          return;
        }
        if (data.available === false) {
          if (!unavailableShown) {
            body.innerHTML = '<div class="transcript-empty">音声認識は利用できません</div>';
            unavailableShown = true;
          }
          return;
        }
        unavailableShown = false;  // available に戻ったら再表示できるよう解除
        if (data.segments && data.segments.length) {
          if (!hasText) { body.innerHTML = ''; hasText = true; }
          for (const s of data.segments) {
            const line = document.createElement('div');
            line.className = 'transcript-line';
            line.textContent = s.text;
            body.appendChild(line);
          }
          _asrCursor = data.cursor;
          body.scrollTop = body.scrollHeight;
        }
      })
      .catch(() => {});
  };
  poll();
  _transcriptTimer = setInterval(poll, 1500);
}

function stopTranscript() {
  if (_transcriptTimer) { clearInterval(_transcriptTimer); _transcriptTimer = null; }
  _transcriptStation = null;
}

const CARD_TEMPLATE = (prog) => {
  const safeTitle   = prog.title.replace(/&/g, '&amp;').replace(/"/g, '&quot;');
  const safeStation = prog.station_name.replace(/&/g, '&amp;').replace(/"/g, '&quot;');
  return `
<div class="col-12 col-sm-6 col-lg-4 col-xl-3">
  <div class="card on-air-card h-100"
       data-station-id="${prog.station_id}"
       data-station-name="${safeStation}"
       data-title="${safeTitle}"
       data-is-recording="${prog.is_recording}"
       onclick="playStreamFromCard(this, this.querySelector('.play-btn'))">
    <div class="card-body p-3">
      <div class="d-flex justify-content-between align-items-start mb-2">
        <span class="badge bg-secondary station-badge">${prog.station_name}</span>
        <div class="d-flex gap-1">
          ${prog.is_recording ? '<span class="badge bg-danger"><i class="bi bi-record-fill"></i> REC</span>' : ''}
          <span class="badge bg-danger on-air-badge"><i class="bi bi-broadcast-pin"></i> ON AIR</span>
        </div>
      </div>
      <h6 class="card-title mb-1 on-air-title">${prog.title}</h6>
      ${prog.pfm ? `<p class="card-text text-secondary small mb-1">${prog.pfm}</p>` : ''}
      <p class="card-text text-secondary small mb-2">
        ${prog.start_time.slice(11,16)} 〜 ${prog.end_time.slice(11,16)}
        (${Math.floor(prog.duration/60)}分)
      </p>
      <div class="progress on-air-progress" style="height: 3px;">
        <div class="progress-bar bg-danger" style="width: ${prog.progress}%"></div>
      </div>
    </div>
    <div class="card-footer p-2 text-end">
      <button class="btn btn-sm btn-danger play-btn" onclick="event.stopPropagation(); playStreamFromCard(this.closest('[data-station-id]'), this)">
        <i class="bi bi-play-fill me-1"></i>${prog.is_recording ? '録音から再生' : '再生'}
      </button>
    </div>
  </div>
</div>`;
};

function playStreamFromCard(cardEl, btnEl) {
  const d = cardEl.dataset;
  playStream(d.stationId, d.stationName, d.title, d.isRecording === 'true', btnEl);
}

function loadOnAir() {
  document.getElementById('onAirLoader').classList.remove('d-none');
  document.getElementById('onAirGrid').classList.add('d-none');
  document.getElementById('onAirError').classList.add('d-none');
  document.getElementById('refreshBtn').disabled = true;

  fetch('/api/on-air')
    .then(r => r.json())
    .then(data => {
      const grid = document.getElementById('onAirGrid');
      grid.innerHTML = data.map(CARD_TEMPLATE).join('');
      grid.classList.remove('d-none');
      document.getElementById('onAirLoader').classList.add('d-none');
    })
    .catch(() => {
      document.getElementById('onAirError').classList.remove('d-none');
      document.getElementById('onAirLoader').classList.add('d-none');
    })
    .finally(() => {
      document.getElementById('refreshBtn').disabled = false;
    });
}

function playStream(stationId, stationName, title, isRecording, btnEl) {
  // リクエストIDを採番し、古いコールバックを無効化する
  const myRequestId  = ++_streamRequestId;
  // 接続中・再生中を問わず既存ストリームがあれば stop-stream が必要
  const wasActive    = _activeStationId !== null;
  _activeStationId   = stationId; // 新ステーションを即座にアクティブとしてマーク
  _lastStation = { id: stationId, name: stationName, title, isRecording };

  const audio        = document.getElementById('streamAudio');
  const bar          = document.getElementById('nowPlayingBar');
  const spinner      = document.getElementById('connectingSpinner');
  const statusText   = document.getElementById('connectingStatus');
  const errMsg       = document.getElementById('streamError');
  const badge        = document.getElementById('nowPlayingBadge');

  // 既存再生・タイムアウトをリセット
  if (!audio.paused) { audio.pause(); }
  if (window._streamTimeout) { clearTimeout(window._streamTimeout); window._streamTimeout = null; }
  audio.onerror   = null;
  audio.oncanplay = null;
  audio.onplaying = null;
  audio.onwaiting = null;
  audio.onstalled = null;
  audio.removeAttribute('src');
  audio.load();

  // 押されたボタンをローディング状態にする
  const playLabel = isRecording ? '録音から再生' : '再生';
  if (btnEl) {
    btnEl.disabled = true;
    btnEl.innerHTML = '<span class="spinner-border spinner-border-sm me-1" role="status"></span>接続中...';
  }
  function resetBtn() {
    if (btnEl) {
      btnEl.disabled = false;
      btnEl.innerHTML = '<i class="bi bi-play-fill me-1"></i>' + playLabel;
    }
  }

  function showError(message) {
    if (myRequestId !== _streamRequestId) return; // 古いリクエストは無視
    clearTimeout(window._streamTimeout);
    window._streamTimeout = null;
    spinner.classList.add('d-none');
    statusText.textContent = '';
    bar.classList.remove('bar-connecting');
    errMsg.innerHTML = '<i class="bi bi-exclamation-triangle me-1"></i>' + message;
    errMsg.className = 'text-danger small';
    _activeStationId = null;
    stopTranscript();
    document.getElementById('transcriptPanel').classList.add('d-none');
    resetBtn();
    // 再生不可の場合は 4 秒後にバーを自動非表示
    window._streamTimeout = setTimeout(() => {
      bar.classList.add('d-none');
      window._streamTimeout = null;
    }, 4000);
  }

  function onConnected() {
    if (myRequestId !== _streamRequestId) return; // 古いリクエストは無視
    if (window._streamTimeout) { clearTimeout(window._streamTimeout); window._streamTimeout = null; }
    spinner.classList.add('d-none');
    statusText.textContent = '';
    bar.classList.remove('bar-connecting');
    errMsg.className = 'd-none';
    resetBtn();
    startTranscript(stationId);
  }

  // バーを「接続中」で即表示
  document.getElementById('nowPlayingTitle').textContent = title;
  document.getElementById('nowPlayingStation').textContent = stationName;
  badge.innerHTML = isRecording
    ? '<i class="bi bi-record-fill"></i> REC'
    : '<i class="bi bi-broadcast-pin"></i> LIVE';
  errMsg.className = 'd-none';
  errMsg.innerHTML = '';
  spinner.classList.remove('d-none');
  statusText.textContent = 'ストリーム確認中...';
  bar.classList.remove('d-none');
  bar.classList.add('bar-connecting');

  const startFetch = () => {
    if (myRequestId !== _streamRequestId) return; // 後続リクエストで上書き済み

    fetch('/api/stream-status/' + stationId)
      .then(r => r.json())
      .then(status => {
        if (myRequestId !== _streamRequestId) return; // 後続リクエストで上書き済み

        if (!status.available) {
          showError(status.reason);
          return;
        }

        statusText.textContent = '接続中...';

        // 20 秒以内に再生が始まらなければタイムアウト
        window._streamTimeout = setTimeout(() => {
          if (myRequestId !== _streamRequestId) return;
          audio.pause();
          audio.removeAttribute('src');
          showError('接続タイムアウト（ストリーミングが開始されませんでした）');
        }, 20000);

        audio.onerror = function () {
          if (myRequestId !== _streamRequestId) return;
          const code = audio.error ? audio.error.code : -1;
          const msgs = {
            [MediaError.MEDIA_ERR_NETWORK]: 'ネットワークエラー（SDR 未接続の可能性）',
            [MediaError.MEDIA_ERR_DECODE]:  '音声デコードエラー',
            [MediaError.MEDIA_ERR_SRC_NOT_SUPPORTED]: '音声形式未対応',
          };
          showError(msgs[code] || 'ストリーミングエラー (code=' + code + ')');
        };

        audio.onwaiting = function () {
          if (myRequestId !== _streamRequestId) return;
          spinner.classList.remove('d-none');
          statusText.textContent = 'バッファリング中...';
        };

        audio.onstalled = function () {
          if (myRequestId !== _streamRequestId) return;
          spinner.classList.remove('d-none');
          statusText.textContent = '接続が遅延しています...';
          // SDR ロックを即座に解放し、他局への切り替えを妨げないようにする
          _activeStationId = null;
          fetch('/api/stop-stream', { method: 'POST' }).catch(() => {});
        };

        audio.oncanplay = function () { onConnected(); };
        audio.onplaying = function () { onConnected(); };

        audio.src = '/stream/' + stationId;
        const playPromise = audio.play();
        if (playPromise !== undefined) {
          playPromise.catch(err => {
            if (err.name === 'AbortError') return; // pause() による意図的な中断、無視
            if (myRequestId !== _streamRequestId) return;
            showError('再生エラー: ' + err.message);
          });
        }
      })
      .catch(err => {
        if (myRequestId !== _streamRequestId) return;
        showError(err.message);
      });
  };

  if (wasActive) {
    // 旧ストリームの SDR デバイス解放を確実に待ってから新ストリームを開始
    fetch('/api/stop-stream', { method: 'POST' })
      .finally(() => startFetch());
  } else {
    startFetch();
  }
}

function stopStream() {
  ++_streamRequestId;  // 進行中のすべてのコールバックを無効化
  _activeStationId = null;
  _lastStation = null;
  const audio = document.getElementById('streamAudio');
  if (window._streamTimeout) { clearTimeout(window._streamTimeout); window._streamTimeout = null; }
  audio.onerror   = null;
  audio.oncanplay = null;
  audio.onplaying = null;
  audio.onwaiting = null;
  audio.onstalled = null;
  audio.pause();
  audio.src = '';
  const bar = document.getElementById('nowPlayingBar');
  bar.classList.add('d-none');
  bar.classList.remove('bar-connecting');
  document.getElementById('connectingStatus').textContent = '';
  stopTranscript();  // ポーリング停止（パネルは停止後も読めるよう残す）
  fetch('/api/stop-stream', { method: 'POST' }).catch(() => {});
}

function restartStream() {
  if (!_lastStation) return;
  const { id, name, title, isRecording } = _lastStation;
  // デッドロック時は _activeStationId が null でも SDR が残っている可能性があるため
  // 明示的に stop-stream を先に呼んでから再接続する
  fetch('/api/stop-stream', { method: 'POST' })
    .finally(() => playStream(id, name, title, isRecording, null));
}

document.addEventListener('DOMContentLoaded', () => { loadOnAir(); syncAsrState(); });
</script>
{% endblock %}
