services:
  radio-scheduler:
    profiles: [cli]
    build:
      context: .
      dockerfile: DockerFile
    environment:
      TZ: Asia/Tokyo
    command:
      - radio-scheduler
      - --stations
      - FMT
      - --rec-dir
      - /app/recordings
      - --log-dir
      - /app/log
    volumes:
      - ./recordings:/app/recordings
      - ./log:/app/log
    devices:
      - /dev/bus/usb:/dev/bus/usb
    restart: unless-stopped

  radio-webui:
    profiles: [web]
    build:
      context: .
      dockerfile: DockerFile
    environment:
      TZ: Asia/Tokyo
      # ASR（字幕生成）: parakeet.cpp(parakeet-cli) バイナリ。
      # VAD onnx と ASR gguf は MODELS_DIR(=data/models マウント) から参照する
      # （イメージ非同梱。silero_vad.onnx / parakeet-tdt-0.6b-ja.gguf を data/models に置く）。
      PARAKEET_CPP_BIN: /usr/local/bin/parakeet-cli
      # llama_mtmd backend（Qwen3-ASR）用。本体/mmproj GGUF は MODELS_DIR から参照。
      LLAMA_MTMD_BIN: /usr/local/bin/llama-mtmd-cli
      MODELS_DIR: /app/data/models
    command:
      - radio-webui
    volumes:
      - ./recordings:/app/recordings
      - ./log:/app/log
      - ./data:/app/data
    devices:
      - /dev/bus/usb:/dev/bus/usb
    ports:
      # macOS の Control Center/AirPlay Receiver が 5000 番を使うことがあるため、
      # ホスト側は 5001 番に公開する（コンテナ内の Uvicorn は 5000 番）。
      - "5001:5000"
    restart: unless-stopped
