services:
  radio-scheduler:
    profiles: [cli]
    build:
      context: .
      dockerfile: DockerFile
    environment:
      TZ: Asia/Tokyo
    command:
      - radio_scheduler.py
      - --stations
      - FMT
      - --rec-dir
      - /app/recordings
      - --log-dir
      - /app/log
    volumes:
      - ./recordings:/app/recordings
      - ./log:/app/log
    devices:
      - /dev/bus/usb:/dev/bus/usb
    restart: unless-stopped

  radio-webui:
    profiles: [web]
    build:
      context: .
      dockerfile: DockerFile
    environment:
      TZ: Asia/Tokyo
      # ASR（字幕生成）: CrispASR バイナリ + 変換済み GGUF。
      # GGUF は data/models にマウントしたものを参照する。
      PARAKEET_CPP_BIN: /usr/local/bin/crispasr
      PARAKEET_MODEL: /app/data/models/parakeet-tdt-0.6b-ja.gguf
    command:
      - radio_scheduler_webui.py
    volumes:
      - ./recordings:/app/recordings
      - ./log:/app/log
      - ./data:/app/data
    devices:
      - /dev/bus/usb:/dev/bus/usb
    ports:
      - "5000:5000"
    restart: unless-stopped
